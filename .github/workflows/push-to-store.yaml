name: Push APK to Central F-Droid Store

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        shell: python
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
        run: |
          import base64
          import os
          keystore_b64 = os.environ.get('KEYSTORE_BASE64', '')
          if keystore_b64:
              with open('release.keystore', 'wb') as f:
                  f.write(base64.b64decode(keystore_b64.strip()))
              print("✅ Keystore decoded successfully")
          else:
              print("❌ KEYSTORE_BASE64 secret is empty")
              exit(1)

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -x lintVitalRelease

      - name: Checkout Central F-Droid Store
        uses: actions/checkout@v4
        with:
          repository: Dynag1/Dynag1-Fdroid
          token: ${{ secrets.STORE_PAT }}
          path: store-repo

      - name: Push APK and Metadata to Store
        run: |
          PKG_ID="co.dynag.scrybook"

          mkdir -p store-repo/apks/$PKG_ID
          mkdir -p store-repo/metadata/$PKG_ID/en-US
          mkdir -p store-repo/metadata/$PKG_ID/fr-FR

          cp app/build/outputs/apk/release/*.apk store-repo/apks/$PKG_ID/scrybook-release.apk

          cp -r fastlane/metadata/android/fr-FR/* store-repo/metadata/$PKG_ID/fr-FR/ 2>/dev/null || true
          cp -r fastlane/metadata/android/en-US/* store-repo/metadata/$PKG_ID/en-US/ 2>/dev/null || true

          # Corriger le script de build-store dans le repo de destination pour copier correctement les métadonnées
          if [ -f store-repo/.github/workflows/build-store.yml ]; then
            sed -i 's|cp -r metadata/\* fdroid/repo/|cp -r metadata fdroid/|g' store-repo/.github/workflows/build-store.yml
          fi

          cd store-repo
          git config user.name "App Github Action"
          git config user.email "actions@github.com"

          # Pull d'abord pour éviter les conflits de push (--autostash gère les fichiers non stagés)
          git pull --rebase --autostash origin main

          git add apks/ metadata/ .github/workflows/
          git status
          if git commit -m "Mise à jour automatique de l'APK ScryBook et correction build-store"; then
            success=false
            for i in 1 2 3; do
              echo "Push attempt $i..."
              if git pull --rebase --autostash origin main && git push origin main; then
                success=true
                break
              fi
              echo "Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
            if [ "$success" = "false" ]; then
              echo "ERROR: Failed to push to Dynag1-Fdroid remote repository. Please check if your STORE_PAT token is valid, has not expired, and has write permissions to Dynag1/Dynag1-Fdroid."
              exit 1
            fi
          else
            echo "Rien à commiter"
          fi
